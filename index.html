
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="triangle-box">

        <h2>Triangle Type Checker</h2>

        <input type="number" id="angle1" placeholder="Enter First Angle">
        <input type="number" id="angle2" placeholder="Enter Second Angle">
        <input type="number" id="angle3" placeholder="Enter Third Angle">

        <button id="checkBtn">Check Triangle</button>
        <button id="resetBtn">Reset</button>

        <div id="result">
            Result
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
